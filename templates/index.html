<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lider Kids - Musobaqa</title>
    <style>
        :root { --success: #28a745; --danger: #dc3545; --primary: #1a73e8; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; text-align: center; margin: 0; padding: 20px; }
        
        /* O'yin maydoni */
        #game-screen, #result-screen { display: none; }
        #game-screen.active, #result-screen.active { display: block; }

        .target-word { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        #canvas-container { background: white; border: 4px solid #333; border-radius: 15px; display: inline-block; }
        
        .timer { font-size: 1.5rem; font-weight: bold; color: var(--danger); }
        .progress { margin: 10px; font-weight: bold; }

        /* Natijalar panjarasi */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px; max-width: 900px; margin: 0 auto; }
        .result-card { background: white; border-radius: 10px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .result-card img { width: 100%; border-radius: 5px; margin-bottom: 5px; }
        .result-card.correct { border: 5px solid var(--success); }
        .result-card.wrong { border: 5px solid var(--danger); }
        
        button { padding: 12px 30px; font-size: 1.1rem; border: none; border-radius: 25px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="/static/audio/bg_music.mp3" loop></audio>

    <!-- O'YIN EKRANI -->
    <div id="game-screen" class="active">
        <h1>Musobaqa boshlandi!</h1>
        <div class="progress">Savol: <span id="current-num">1</span> / 5</div>
        <div class="timer">Vaqt: <span id="timer">20</span>s</div>
        <div class="target-word" id="target">...</div>
        
        <div id="canvas-container">
            <canvas id="canvas" width="350" height="350"></canvas>
        </div>
        
        <div id="ai-status" style="margin-top:10px; font-style:italic;">Menimcha, bu...</div>
        <button onclick="clearCanvas()" style="background:#6c757d">Tozalash</button>
    </div>

    <!-- NATIJALAR EKRANI -->
    <div id="result-screen">
        <h1>O'yin tugadi!</h1>
        <h2 id="final-score">Ball: 0 / 5</h2>
        <div class="results-grid" id="results-container"></div>
        <button onclick="resetGame()">Qayta o'ynash (Keyingi ishtirokchi)</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // O'zingizda qolgan 46 ta kategoriyani shu yerga yozing
        const allLabels = ["Olma", "Mashina", "Uy", "Quyosh", "Daraxt", "Velosiped", "Yulduz"]; 
        
        let gameTasks = [];
        let currentIndex = 0;
        let timer = 20;
        let score = 0;
        let interval;
        let savedResults = []; // Rasmlarni saqlash uchun
        let isCorrectInRound = false;

        // Chizish sozlamalari
        let drawing = false;
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'black';

        function init() {
            canvas.addEventListener('mousedown', () => { drawing = true; playMusic(); });
            canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); autoPredict(); });
            canvas.addEventListener('mousemove', draw);
            
            resetGame();
        }

        function resetGame() {
            gameTasks = allLabels.sort(() => 0.5 - Math.random()).slice(0, 5);
            currentIndex = 0;
            score = 0;
            savedResults = [];
            
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            startRound();
        }

        function startRound() {
            isCorrectInRound = false;
            timer = 20;
            document.getElementById('current-num').innerText = currentIndex + 1;
            document.getElementById('target').innerText = gameTasks[currentIndex];
            document.getElementById('ai-status').innerText = "Menimcha, bu...";
            clearCanvas();
            
            clearInterval(interval);
            interval = setInterval(tick, 1000);
        }

        function tick() {
            timer--;
            document.getElementById('timer').innerText = timer;
            if (timer <= 0) {
                finishRound(false);
            }
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        async function autoPredict() {
            if (isCorrectInRound) return;
            const dataUrl = canvas.toDataURL('image/png');
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image: dataUrl})
            });
            const result = await response.json();
            document.getElementById('ai-status').innerText = "Menimcha, bu: " + result.label;

            if (result.label === gameTasks[currentIndex]) {
                isCorrectInRound = true;
                score++;
                finishRound(true);
            }
        }

        function finishRound(correct) {
            clearInterval(interval);
            clearInterval(predictInterval);
            // Rasmni saqlab qo'yamiz
            savedResults.push({
                img: canvas.toDataURL(),
                label: gameTasks[currentIndex],
                status: correct ? 'correct' : 'wrong'
            });

            currentIndex++;
            if (currentIndex < 5) {
                setTimeout(startRound, 1000); // 1 soniya kutib keyingisiga o'tadi
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('final-score').innerText = `Ball: ${score} / 5`;
            
            const container = document.getElementById('results-container');
            container.innerHTML = "";
            
            savedResults.forEach(res => {
                const card = document.createElement('div');
                card.className = `result-card ${res.status}`;
                card.innerHTML = `
                    <img src="${res.img}">
                    <div style="font-weight:bold">${res.label}</div>
                    <div>${res.status === 'correct' ? '✅ Topildi' : '❌ Topilmadi'}</div>
                `;
                container.appendChild(card);
            });
        }

        function playMusic() {
            const m = document.getElementById('bgMusic');
            if(m.paused) m.play();
        }
        let predictInterval; // Yangi o'zgaruvchi

        function startRound() {
            isCorrectInRound = false;
            timer = 20;
            document.getElementById('current-num').innerText = currentIndex + 1;
            document.getElementById('target').innerText = gameTasks[currentIndex];
            document.getElementById('ai-status').innerText = "Menimcha, bu...";
            clearCanvas();
            
            clearInterval(interval);
            clearInterval(predictInterval); // Eskisini tozalaymiz
            
            interval = setInterval(tick, 1000);
            
            // Har 1.5 soniyada AI o'zi mustaqil tekshirib turadi
            predictInterval = setInterval(() => {
                if (gameActive && !drawing) { // Bola chizishdan to'xtab turgan qisqa soniyada tekshiradi
                    autoPredict();
                }
            }, 1500);
        }

        init();
    </script>
</body>
</html>
