<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #28a745;
            --danger: #dc3545;
            --gray: #6c757d;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Ekranlarni boshqarish */
        .screen {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
        }

        .active-screen {
            display: flex !important;
        }

        /* Canvas sozlamalari */
        #canvas-container {
            background: var(--white);
            border: 5px solid #333;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin: 15px auto;
            position: relative;
            touch-action: none; /* Telefonda ekranni qotiradi */
        }

        canvas {
            touch-action: none;
            cursor: crosshair;
            display: block;
        }

        /* O'yin elementlari */
        .target-word {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
            text-transform: uppercase;
        }

        .timer-box {
            font-size: 1.6rem;
            color: var(--danger);
            font-weight: bold;
            background: #ffebeb;
            padding: 5px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        /* Natijalar paneli (3x2 format) */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 ta ustun */
            gap: 12px;
            width: 100%;
            margin-top: 20px;
        }

        .result-card {
            background: white;
            padding: 8px;
            border-radius: 12px;
            border: 4px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .result-card.correct { border-color: var(--success); background: #f0fff4; }
        .result-card.wrong { border-color: var(--danger); background: #fff5f5; }

        .result-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #fff;
        }

        .result-card p {
            margin: 5px 0 0 0;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Tugmalar */
        button {
            padding: 15px 40px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(26, 115, 232, 0.3);
        }

        button:active { transform: scale(0.95); }

        .btn-secondary { background: var(--gray); font-size: 1rem; padding: 10px 25px; margin-top: 10px; }

        #ai-guess {
            font-size: 1.1rem;
            font-style: italic;
            color: #555;
            height: 25px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="/static/audio/bg_music.mp3" loop></audio>

    <!-- 1. START EKRANI -->
    <div id="start-screen" class="screen active-screen">
        <h1 style="font-size: 3.5rem; color: var(--primary); margin-bottom: 10px;">Quvnoq qalam</h1>
        <p style="font-size: 1.2rem; color: #666; margin-bottom: 30px;">6 ta rasmni vaqt tugashidan oldin chizib tugating!</p>
        <button onclick="startGame()">Boshlash</button>
    </div>

    <!-- 2. O'YIN EKRANI -->
    <div id="game-screen" class="screen">
        <div class="timer-box">Vaqt: <span id="timer">30</span>s</div>
        <div style="margin-top: 10px; font-weight: bold;">Rasm: <span id="current-step">1</span> / 6</div>
        <div class="target-word" id="target">...</div>
        
        <div id="canvas-container">
            <canvas id="canvas" width="340" height="340"></canvas>
        </div>

        <div id="ai-guess">Chizishni boshlang...</div>
        <button class="btn-secondary" onclick="clearCanvas()">O'chirish</button>
    </div>

    <!-- 3. NATIJALAR EKRANI -->
    <div id="result-screen" class="screen">
        <h1 style="margin-bottom: 5px;">Ajoyib!</h1>
        <h2 id="final-score" style="color: var(--success);">Ball: 0 / 6</h2>
        <div class="results-grid" id="results-container"></div>
        <button onclick="location.reload()" style="margin-top: 30px;">Yana o'ynash</button>
    </div>
    <div style="position: absolute; top: 20px; right: 20px;">
    <button id="mute-btn" onclick="toggleMusic()" style="padding: 10px; background: var(--gray); font-size: 1rem;">
        🔊 Ovoz: ON
    </button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const labels = ["Olma", "Mashina", "Uy", "Quyosh", "Daraxt", "Velosiped", "Yulduz", "Banan", "Soat", "Bulut", "Eshik", "Ko'z", "Baliq", "Gul", "Gitara", "Shlyapa", "Barg", "Oy", "Tog'", "Shim", "Stol", "Mushuk", "It", "Qoshiq", "Krovat", "Kitob", "Kapalak", "Tort", "Kursi", "Piyola", "Quloq", "Oyoq", "Qo'l", "Muzqaymoq", "Kalit", "Burun", "Nok", "Qalam", "Quyon", "Kamalak", "Ilon", "Qorbola", "Paypoq", "Soyabon", "Tarvuz", "G'ildirak"];

        let gameTasks = [];
        let currentIndex = 0;
        let score = 0;
        let timer = 30;
        let timerInterval;
        let drawing = false;
        let savedResults = [];
        let solvedInRound = false;

        // Canvas sozlamalari
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'black';

        function init() {
            // Kompyuter (Mouse)
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);

            // Telefon/Planshet (Touch)
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startDrawing(e.touches[0]);
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                draw(e.touches[0]);
            }, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
        }

        function startGame() {
            document.getElementById('start-screen').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            document.getElementById('bgMusic').play().catch(e => console.log("Music play blocked"));
            
            // Tasodifiy 6 ta elementni takrorlanmas qilib tanlash
            gameTasks = labels.sort(() => 0.5 - Math.random()).slice(0, 6);
            startRound();
        }

        function startRound() {
            solvedInRound = false;
            timer = 30;
            document.getElementById('timer').innerText = timer;
            document.getElementById('current-step').innerText = currentIndex + 1;
            document.getElementById('target').innerText = gameTasks[currentIndex];
            document.getElementById('ai-guess').innerText = "O'ylayapman...";
            clearCanvas();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(tick, 1000);
        }

        function tick() {
            timer--;
            document.getElementById('timer').innerText = timer;
            if (timer <= 0) finishRound(false);
        }

        // Chizish funksiyalari
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function startDrawing(e) {
            drawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }

        function draw(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        }

        function stopDrawing() {
            if (drawing) {
                drawing = false;
                autoPredict(); // Har bir chiziqni uzganda AI taxmin qiladi
            }
        }

        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        async function autoPredict() {
            if (solvedInRound) return;
            
            const dataUrl = canvas.toDataURL('image/png');
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ image: dataUrl })
            });
            const data = await response.json();
            
            document.getElementById('ai-guess').innerText = "Menimcha, bu: " + data.label;

            if (data.label === gameTasks[currentIndex]) {
                solvedInRound = true;
                score++;
                setTimeout(() => finishRound(true), 600);
            }
        }

        function finishRound(correct) {
            clearInterval(timerInterval);
            
            // Rasmni saqlab qo'yish
            savedResults.push({
                img: canvas.toDataURL(),
                word: gameTasks[currentIndex],
                res: correct ? 'correct' : 'wrong'
            });

            currentIndex++;
            if (currentIndex < 6) {
                startRound();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('game-screen').classList.remove('active-screen');
            document.getElementById('result-screen').classList.add('active-screen');
            document.getElementById('final-score').innerText = `Ball: ${score} / 6`;
            
            const container = document.getElementById('results-container');
            savedResults.forEach(r => {
                const card = document.createElement('div');
                card.className = `result-card ${r.res}`;
                card.innerHTML = `<img src="${r.img}"><p>${r.word}</p>`;
                container.appendChild(card);
            });
        }

        init();
        let isMuted = false;
        const bgMusic = document.getElementById('bgMusic');
        const muteBtn = document.getElementById('mute-btn');

        function toggleMusic() {
            if (isMuted) {
                bgMusic.play();
                muteBtn.innerText = "🔊 Ovoz: ON";
                muteBtn.style.background = "var(--gray)";
            } else {
                bgMusic.pause();
                muteBtn.innerText = "      Ovoz: OFF";
                muteBtn.style.background = "#555";
            }
            isMuted = !isMuted;
        }
    </script>
</body>
</html>
